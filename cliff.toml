# git-cliff configuration — https://git-cliff.org
# Generates changelogs from Conventional Commit messages.

[changelog]
# Rendered at the top when generating a full CHANGELOG.md (stripped for release notes).
header = """
# Changelog

All notable changes to this project are documented here.\n
"""
# https://keats.github.io/tera/docs/ — Tera template for each release.
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
            {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
# Tidy up commit messages before grouping.
commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "" },
]
# Map commit prefixes to changelog sections.
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^doc", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^ci|^build", group = "Build & CI" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore|^style", group = "Miscellaneous" },
    { body = ".*security", group = "Security" },
    { message = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
